[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Zecca V2 project (ocfypfqvesuvzsmkeokv) gira PostgreSQL 17.6.x.
# Pre-pivot legacy era PG 15. Aggiornato 2026-04-27.
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Edge Functions verify_jwt overrides — default = true (CLI 2.96+).
# Phase 04 (2026-04): 8 functions usano default true (caller authenticated user),
# 1 function (banking-webhook) override a false perché Saltedge POST è autonoma
# senza JWT da caller (signature verification RSA-SHA256 via SALTEDGE_WEBHOOK_PUBLIC_KEY
# è il meccanismo auth alternativo, ADR-0008).
# Storico: pre-Phase-04 verify_jwt globale = false perché Edge Functions verifier
# supportava solo HS256 vs Supabase ES256. Phase 04 refactor (Deno getClaims pattern)
# è ES256-native, quindi verify_jwt=true ora funziona per le 8 functions.
[functions.banking-webhook]
verify_jwt = false
