# 🎯 Specialized Quality Gates
# Path-triggered workflows for specialized validations
# Only runs when specific files change (cost optimization)

name: Specialized Gates

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/Dockerfile*'
      - '**/docker-compose*.yml'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  push:
    branches: [main, develop]
    paths:
      - '**/Dockerfile*'
      - '**/docker-compose*.yml'
      - 'supabase/migrations/**'
      - 'supabase/functions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '22'
  TURBO_TELEMETRY_DISABLED: '1'  # Opt-out of anonymous telemetry

jobs:
  # ===================================================================
  # 🐳 DOCKERFILE SECURITY: Container security scanning
  # ===================================================================

  dockerfile-security:
    name: 🐳 Dockerfile Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🔍 Find Dockerfiles
        id: find-dockerfiles
        run: |
          DOCKERFILES=$(find . -name "Dockerfile*" -type f | head -10)
          if [ -n "$DOCKERFILES" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$DOCKERFILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "📋 Found Dockerfiles:"
            echo "$DOCKERFILES"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "📋 No Dockerfiles found"
          fi

      - name: 🔍 Run Hadolint
        if: steps.find-dockerfiles.outputs.found == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          recursive: true

      - name: 📋 Dockerfile Security Summary
        if: always()
        run: |
          if [[ "${{ steps.find-dockerfiles.outputs.found }}" == "true" ]]; then
            echo "✅ Dockerfile security scan completed"
            echo "📊 Scans performed:"
            echo "   - Hadolint: Best practices validation"
          else
            echo "⏭️ No Dockerfiles to scan"
          fi

  # ===================================================================
  # 🗃️ SUPABASE SCHEMA: Migration & Edge Function validation
  # ===================================================================

  supabase-validation:
    name: 🗃️ Supabase Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🔍 Check changed Supabase files
        id: changes
        run: |
          # Detect which categories of files changed
          MIGRATIONS_CHANGED="false"
          FUNCTIONS_CHANGED="false"

          if git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD 2>/dev/null | grep -q '^supabase/migrations/'; then
            MIGRATIONS_CHANGED="true"
          fi
          if git diff --name-only ${{ github.event.before || 'HEAD~1' }} HEAD 2>/dev/null | grep -q '^supabase/functions/'; then
            FUNCTIONS_CHANGED="true"
          fi

          echo "migrations_changed=$MIGRATIONS_CHANGED" >> $GITHUB_OUTPUT
          echo "functions_changed=$FUNCTIONS_CHANGED" >> $GITHUB_OUTPUT
          echo "📋 Migrations changed: $MIGRATIONS_CHANGED"
          echo "📋 Functions changed: $FUNCTIONS_CHANGED"

      - name: 🗃️ Validate migration file naming
        if: steps.changes.outputs.migrations_changed == 'true'
        run: |
          echo "🔍 Checking migration file naming conventions..."
          ERRORS=0

          for file in supabase/migrations/*.sql; do
            [ -e "$file" ] || continue
            basename=$(basename "$file")

            # Check naming: YYYYMMDDHHMMSS_description.sql
            if ! echo "$basename" | grep -qE '^[0-9]{14}_[a-z0-9_]+\.sql$'; then
              echo "❌ Invalid migration name: $basename (expected: YYYYMMDDHHMMSS_description.sql)"
              ERRORS=$((ERRORS + 1))
            fi

            # Check file is not empty
            if [ ! -s "$file" ]; then
              echo "❌ Empty migration file: $basename"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ Found $ERRORS migration naming issues"
            exit 1
          fi

          MIGRATION_COUNT=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "✅ All $MIGRATION_COUNT migration files follow naming conventions"

      - name: 🗃️ Validate SQL syntax (basic)
        if: steps.changes.outputs.migrations_changed == 'true'
        run: |
          echo "🔍 Running basic SQL validation on migrations..."
          ERRORS=0

          for file in supabase/migrations/*.sql; do
            [ -e "$file" ] || continue
            basename=$(basename "$file")

            # Check for common SQL issues
            # 1. Unmatched BEGIN/END blocks
            BEGIN_COUNT=$(grep -ci '^\s*BEGIN' "$file" || true)
            END_COUNT=$(grep -ci '^\s*END;' "$file" || true)
            if [ "$BEGIN_COUNT" -ne "$END_COUNT" ] && [ "$BEGIN_COUNT" -gt 0 ]; then
              echo "⚠️ $basename: Mismatched BEGIN ($BEGIN_COUNT) / END ($END_COUNT) blocks"
            fi

            # 2. Check for dangerous operations without IF EXISTS / IF NOT EXISTS
            if grep -qiE '^\s*DROP\s+(TABLE|INDEX|FUNCTION|TRIGGER)\s+(?!IF)' "$file" 2>/dev/null; then
              echo "⚠️ $basename: DROP without IF EXISTS detected"
            fi

            echo "  ✅ $basename — basic checks passed"
          done

          echo "✅ SQL validation completed"

      - name: 🔧 Validate Edge Function structure
        if: steps.changes.outputs.functions_changed == 'true'
        run: |
          echo "🔍 Checking Edge Function structure..."
          ERRORS=0

          for dir in supabase/functions/*/; do
            [ -d "$dir" ] || continue
            func_name=$(basename "$dir")

            # Skip shared directory
            if [ "$func_name" = "_shared" ]; then
              continue
            fi

            # Check for index.ts entry point
            if [ ! -f "${dir}index.ts" ]; then
              echo "❌ $func_name: Missing index.ts entry point"
              ERRORS=$((ERRORS + 1))
            fi

            echo "  ✅ $func_name — structure valid"
          done

          if [ $ERRORS -gt 0 ]; then
            echo "❌ Found $ERRORS Edge Function structure issues"
            exit 1
          fi

          FUNC_COUNT=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' | wc -l)
          echo "✅ All $FUNC_COUNT Edge Functions have valid structure"

  # ===================================================================
  # ✅ SPECIALIZED GATES SUMMARY
  # ===================================================================

  gates-summary:
    name: ✅ Specialized Gates Summary
    runs-on: ubuntu-latest
    needs: [dockerfile-security, supabase-validation]
    if: always()
    timeout-minutes: 3

    steps:
      - name: 📋 Summary
        run: |
          echo "# 🎯 Specialized Quality Gates - Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 🔄 Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          DOCKER_ICON="${{ needs.dockerfile-security.result == 'success' && '✅' || needs.dockerfile-security.result == 'failure' && '❌' || '⏭️' }}"
          DOCKER_RESULT="${{ needs.dockerfile-security.result || 'skipped' }}"
          echo "| 🐳 Dockerfile Security | $DOCKER_ICON $DOCKER_RESULT |" >> $GITHUB_STEP_SUMMARY

          SUPABASE_ICON="${{ needs.supabase-validation.result == 'success' && '✅' || needs.supabase-validation.result == 'failure' && '❌' || '⏭️' }}"
          SUPABASE_RESULT="${{ needs.supabase-validation.result || 'skipped' }}"
          echo "| 🗃️ Supabase Schema | $SUPABASE_ICON $SUPABASE_RESULT |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Path-triggered specialized gates - Run only when relevant files change*" >> $GITHUB_STEP_SUMMARY
