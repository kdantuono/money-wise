# E2E Test Docker Configuration
# Post-Supabase migration: no backend service needed.
# Frontend connects directly to Supabase (hosted).

services:
  # Frontend service for E2E tests
  # Uses pre-built runtime stage with Next.js standalone output
  frontend-e2e:
    image: moneywise-frontend:e2e
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: moneywise-frontend-e2e
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - e2e-network

networks:
  e2e-network:
    driver: bridge
